<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ваш подарок — MusicBouquet</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="gift fade">

    <!-- ФОТО -->
    <img id="giftPhoto" class="gift-photo" src="assets/default-bg.jpg" alt="Фото">

    <!-- ИМЯ -->
    <h1 id="giftName" class="gift-title">Подарок</h1>

    <!-- ТЕКСТ -->
    <div id="giftMessage" class="gift-text"></div>

    <!-- БУКЕТ -->
    <img id="giftBouquet" class="bouquet" src="" alt="Букет">

    <!-- МУЗЫКА -->
    <div class="music-buttons">

        <a id="youtubeBtn" class="youtube" target="_blank">YouTube</a>
        <a id="yandexBtn" class="yandex" target="_blank">Яндекс</a>
        <a id="mp3Btn" class="mp3" target="_blank">MP3</a>

    </div>

</div>

<footer>
    <p>© 2026 MusicBouquet</p>
</footer>

<script src="js/view.js"></script>

</body>
</html>
